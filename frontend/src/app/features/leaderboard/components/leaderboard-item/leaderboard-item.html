<div
  class="bg-surface flex w-full items-center justify-between gap-4 rounded-lg p-4 shadow-sm transition-all"
  [class.border-tertiary]="position() === 1"
  [class.border]="position() === 1">
  <div class="flex items-center gap-4">
    <span
      class="text-secondary text-center font-bold"
      [class.text-tertiary]="position() === 1"
      >#{{ position() }}</span
    >
    <div class="flex flex-col">
      <span
        class="text-break text-primary font-semibold"
        [class.text-tertiary]="position() === 1"
        >{{ user().username }}</span
      >
    </div>
  </div>
  <div
    class="text-primary font-semibold"
    [class.text-tertiary]="position() === 1">
    {{ user().score }} Points
  </div>
</div>
