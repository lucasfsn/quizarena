spring:
    application:
        name: apigateway
    cloud:
        gateway:
            server:
                webflux:
                    globalcors:
                        cors-configurations:
                            "[/**]":
                                allowed-origins:
                                    - "*"
                                allowed-methods:
                                    - "*"
                                allowed-headers:
                                    - "*"
                    routes:
                        - id: userservice
                          uri: http://user-service:8086
                          predicates:
                              - Path=/users/**
                          filters:
                              - StripPrefix=1
                        - id: quizservice
                          uri: http://quiz-service:8087
                          predicates:
                              - Path=/quizzes/**
                        - id: gameservice
                          uri: http://game-service:8088
                          predicates:
                              - Path=/games/**
                        - id: gameservice-ws
                          uri: ws://game-service:8088
                          predicates:
                              - Path=/ws/**
    profiles:
        active: dev
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8080/realms/quizarena
                    jwk-set-uri: http://keycloak:8080/realms/quizarena/protocol/openid-connect/certs

server:
    port: 8085
logging:
    level:
        org:
            springframework:
                cloud:
                    gateway: TRACE
                security: DEBUG
